<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <title>{% block title %}{{ title }}{% endblock %}</title>
</head>
<body>
    <header class="p-3 text-bg-dark"> 
        <div class="container"> 
            <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start"> 
                <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0"> <li>
                    <a href="#" class="nav-link px-2 text-secondary">Home</a>
                </li> 
                
                    <a href="#" class="nav-link px-2 text-white">Contact</a>
                </li> 
                </ul> 
            {% comment %} <div class="text-end"> 
                    <button type="button" class="btn btn-outline-light me-2">Login</button> 
                    <button type="button" class="btn btn-warning">Sign-up</button> 
            </div>  {% endcomment %}
            </div> 
        </div> 
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 My Blog. All rights reserved.</p>
    </footer>
</body>
</html>
